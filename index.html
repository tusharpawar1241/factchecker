<!DOCTYPE html>
<html lang="en" className="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifai – Deep Research Fact-Checker</title>
  <meta name="description" content="Autonomous AI fact-checking agent. Paste a headline and let Verifai search, scrape, and verify it in real time." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    :root {
      --bg-matte: #1a1a1a;
      --noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }
    
    html, body, #root { height: 100%; overflow: hidden; }
    body { background: var(--bg-matte); color: #f3f4f6; }

    /* Frosted sandblasted glass texture overlay */
    .glass-panel { 
      position: relative; 
      overflow: hidden; 
    }
    .glass-panel::before {
      content: ""; 
      position: absolute; 
      inset: 0; 
      border-radius: inherit;
      background-image: var(--noise); 
      pointer-events: none; 
      z-index: 1;
    }

    /* Gel capsule rim-light: simulates curved wet surface catching top light */
    .gel-btn { 
      position: relative; 
      overflow: hidden; 
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0px 1px 2px rgba(255, 255, 255, 0.2);
    }
    .gel-btn::after {
      content: ""; 
      position: absolute;
      top: 0; left: 10%; right: 10%; height: 45%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
      border-radius: 50% 50% 0 0; 
      pointer-events: none; 
      z-index: 2;
    }

    /* Scrollbars */
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 20px; }
  </style>
</head>
<body class="dark bg-[#1a1a1a]">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
