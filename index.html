<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifai – Deep Research Fact-Checker</title>
  <meta name="description" content="Autonomous AI fact-checking agent. Paste a headline and let Verifai search, scrape, and verify it in real time." />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body, #root { 
      height: 100%; 
      overflow: hidden;
    }
    body { 
      background: radial-gradient(ellipse at top right, #1a1a3a 0%, #09090b 50%, #000000 100%);
      background-attachment: fixed;
      color: white;
    }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { 
      background: rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px; 
    }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { 
      background: rgba(255, 255, 255, 0.2); 
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
